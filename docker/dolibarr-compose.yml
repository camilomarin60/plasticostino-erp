services:
  dolibarr_db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: dolibarr
      MYSQL_DATABASE: dolibarr
      MYSQL_USER: dolibarr
      MYSQL_PASSWORD: dolibarr
    volumes:
      - dolibarr_db:/var/lib/mysql
    restart: unless-stopped

  dolibarr:
    image: dolibarr/dolibarr:20.0.3
    environment:
      DOLI_DB_HOST: dolibarr_db
      DOLI_DB_NAME: dolibarr
      DOLI_DB_USER: dolibarr
      DOLI_DB_PASSWORD: dolibarr
      DOLI_ADMIN_LOGIN: admin
      DOLI_ADMIN_PASSWORD: admin123
      DOLI_URL_ROOT: "http://localhost:8081"
    ports:
      - "8081:80"
    volumes:
      - dolibarr_html:/var/www/html/documents
    depends_on:
      - dolibarr_db
    restart: unless-stopped

volumes:
  dolibarr_db:
  dolibarr_html:
